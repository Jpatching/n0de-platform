name: 🌙 Nightly Health Monitoring & Payment System Validation

on:
  schedule:
    # Run every night at 2:00 AM UTC
    - cron: '0 2 * * *'
    # Run every 6 hours for payment system monitoring
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      full_health_check:
        description: 'Run full comprehensive health check'
        required: false
        default: 'true'
        type: boolean
      payment_stress_test:
        description: 'Run payment system stress test'
        required: false
        default: 'false'
        type: boolean
      alert_on_failure:
        description: 'Send alerts on health check failures'
        required: false
        default: 'true'
        type: boolean

env:
  BACKEND_URL: 'https://n0de-backend-production-4e34.up.railway.app'
  FRONTEND_URL: 'https://www.n0de.pro'
  ADMIN_URL: 'https://admin-n0de.vercel.app'
  HEALTH_CHECK_TIMEOUT: 30
  ALERT_WEBHOOK: ${{ secrets.HEALTH_ALERT_WEBHOOK }}

jobs:
  system-health-overview:
    runs-on: ubuntu-latest
    name: 🏥 System Health Overview
    
    outputs:
      backend_status: ${{ steps.health.outputs.backend_status }}
      frontend_status: ${{ steps.health.outputs.frontend_status }}
      overall_health: ${{ steps.health.outputs.overall_health }}
    
    steps:
    - name: System health check
      id: health
      run: |
        echo "🏥 Starting comprehensive system health check..."
        
        SERVICES=(
          "backend|${{ env.BACKEND_URL }}/health"
          "frontend|${{ env.FRONTEND_URL }}"
          "admin|${{ env.ADMIN_URL }}"
        )
        
        HEALTHY_SERVICES=0
        TOTAL_SERVICES=${#SERVICES[@]}
        FAILED_SERVICES=()
        
        for service_info in "${SERVICES[@]}"; do
          IFS='|' read -r service_name service_url <<< "$service_info"
          
          echo "🔍 Checking $service_name health..."
          
          # Test with multiple methods to ensure reliability
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time ${{ env.HEALTH_CHECK_TIMEOUT }} "$service_url" || echo "000")
          
          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "✅ $service_name is healthy (HTTP $HTTP_CODE)"
            ((HEALTHY_SERVICES++))
            
            # Additional health metrics
            RESPONSE_TIME=$(curl -s -o /dev/null -w "%{time_total}" --max-time ${{ env.HEALTH_CHECK_TIMEOUT }} "$service_url" || echo "timeout")
            echo "   Response time: ${RESPONSE_TIME}s"
            
          else
            echo "❌ $service_name is unhealthy (HTTP $HTTP_CODE)"
            FAILED_SERVICES+=("$service_name:$HTTP_CODE")
            
            # Try to get more diagnostic info
            if [[ "$HTTP_CODE" == "000" ]]; then
              echo "   Error: Connection timeout or DNS failure"
            elif [[ "$HTTP_CODE" -ge 500 ]]; then
              echo "   Error: Server error - service may be down"
            elif [[ "$HTTP_CODE" -ge 400 ]]; then
              echo "   Error: Client error - check endpoint configuration"
            fi
          fi
        done
        
        # Calculate health percentage
        HEALTH_PERCENTAGE=$(( (HEALTHY_SERVICES * 100) / TOTAL_SERVICES ))
        
        echo ""
        echo "📊 System Health Summary:"
        echo "   Healthy Services: $HEALTHY_SERVICES/$TOTAL_SERVICES ($HEALTH_PERCENTAGE%)"
        echo "   Failed Services: ${#FAILED_SERVICES[@]}"
        
        if [[ ${#FAILED_SERVICES[@]} -gt 0 ]]; then
          echo "   Failed Services Details:"
          printf '     - %s\n' "${FAILED_SERVICES[@]}"
        fi
        
        # Set outputs
        echo "backend_status=$([[ " ${FAILED_SERVICES[@]} " =~ "backend:" ]] && echo "unhealthy" || echo "healthy")" >> $GITHUB_OUTPUT
        echo "frontend_status=$([[ " ${FAILED_SERVICES[@]} " =~ "frontend:" ]] && echo "unhealthy" || echo "healthy")" >> $GITHUB_OUTPUT
        
        if [[ $HEALTHY_SERVICES -eq $TOTAL_SERVICES ]]; then
          echo "overall_health=excellent" >> $GITHUB_OUTPUT
          echo "🎉 All systems are healthy!"
        elif [[ $HEALTH_PERCENTAGE -ge 75 ]]; then
          echo "overall_health=good" >> $GITHUB_OUTPUT
          echo "✅ Most systems are healthy"
        elif [[ $HEALTH_PERCENTAGE -ge 50 ]]; then
          echo "overall_health=degraded" >> $GITHUB_OUTPUT
          echo "⚠️ System performance is degraded"
        else
          echo "overall_health=critical" >> $GITHUB_OUTPUT
          echo "🚨 Critical system health issues detected"
          exit 1
        fi
    
    - name: Database connectivity check
      run: |
        echo "🗄️ Checking database connectivity..."
        
        # Test database health endpoint
        DB_HEALTH_RESPONSE=$(curl -s --max-time 15 "${{ env.BACKEND_URL }}/api/health/db" || echo "ERROR")
        DB_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ env.BACKEND_URL }}/api/health/db" || echo "000")
        
        if [[ "$DB_HTTP_CODE" == "200" ]]; then
          echo "✅ Database connectivity is healthy"
          
          # Try to parse database metrics if available
          if echo "$DB_HEALTH_RESPONSE" | jq . >/dev/null 2>&1; then
            echo "✅ Database health response is valid JSON"
            
            # Extract metrics if available
            if echo "$DB_HEALTH_RESPONSE" | jq -e '.connectionCount' >/dev/null 2>&1; then
              CONNECTION_COUNT=$(echo "$DB_HEALTH_RESPONSE" | jq -r '.connectionCount')
              echo "   Active connections: $CONNECTION_COUNT"
            fi
            
            if echo "$DB_HEALTH_RESPONSE" | jq -e '.responseTime' >/dev/null 2>&1; then
              RESPONSE_TIME=$(echo "$DB_HEALTH_RESPONSE" | jq -r '.responseTime')
              echo "   Database response time: ${RESPONSE_TIME}ms"
            fi
          fi
        else
          echo "❌ Database connectivity check failed (HTTP $DB_HTTP_CODE)"
          
          if [[ "$DB_HTTP_CODE" == "404" ]]; then
            echo "   Database health endpoint may not be implemented"
          elif [[ "$DB_HTTP_CODE" -ge 500 ]]; then
            echo "   Database server error - investigate immediately"
          fi
        fi
    
    - name: Cache system health check
      run: |
        echo "🔄 Checking cache system health..."
        
        # Test Redis/cache health endpoint
        CACHE_HEALTH_RESPONSE=$(curl -s --max-time 15 "${{ env.BACKEND_URL }}/api/health/cache" || echo "ERROR")
        CACHE_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ env.BACKEND_URL }}/api/health/cache" || echo "000")
        
        if [[ "$CACHE_HTTP_CODE" == "200" ]]; then
          echo "✅ Cache system is healthy"
          
          if echo "$CACHE_HEALTH_RESPONSE" | jq . >/dev/null 2>&1; then
            echo "✅ Cache health response is valid JSON"
            
            # Extract cache metrics if available
            if echo "$CACHE_HEALTH_RESPONSE" | jq -e '.memory' >/dev/null 2>&1; then
              CACHE_MEMORY=$(echo "$CACHE_HEALTH_RESPONSE" | jq -r '.memory')
              echo "   Cache memory usage: $CACHE_MEMORY"
            fi
          fi
        else
          echo "⚠️ Cache system check failed (HTTP $CACHE_HTTP_CODE)"
          
          if [[ "$CACHE_HTTP_CODE" == "404" ]]; then
            echo "   Cache health endpoint may not be implemented"
          fi
        fi

  payment-system-health:
    runs-on: ubuntu-latest
    name: 💳 Payment System Health Check
    needs: system-health-overview
    
    steps:
    - name: Payment endpoints availability
      run: |
        echo "💳 Checking payment system endpoints availability..."
        
        PAYMENT_ENDPOINTS=(
          "Payment Creation|${{ env.BACKEND_URL }}/api/payments"
          "Subscription Plans|${{ env.BACKEND_URL }}/api/subscriptions/plans"
          "Payment History|${{ env.BACKEND_URL }}/api/payments/history"
          "Billing Status|${{ env.BACKEND_URL }}/api/billing/status"
        )
        
        HEALTHY_ENDPOINTS=0
        TOTAL_ENDPOINTS=${#PAYMENT_ENDPOINTS[@]}
        
        for endpoint_info in "${PAYMENT_ENDPOINTS[@]}"; do
          IFS='|' read -r endpoint_name endpoint_url <<< "$endpoint_info"
          
          echo "🔍 Testing $endpoint_name..."
          
          # Test GET request (should return 200 or 405 Method Not Allowed for protected endpoints)
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$endpoint_url" || echo "000")
          
          if [[ "$HTTP_CODE" == "200" || "$HTTP_CODE" == "401" || "$HTTP_CODE" == "405" ]]; then
            echo "✅ $endpoint_name endpoint is accessible (HTTP $HTTP_CODE)"
            ((HEALTHY_ENDPOINTS++))
          elif [[ "$HTTP_CODE" == "404" ]]; then
            echo "ℹ️ $endpoint_name endpoint not found (may not be implemented)"
            ((HEALTHY_ENDPOINTS++))  # Count as healthy since it's responding
          else
            echo "❌ $endpoint_name endpoint is unhealthy (HTTP $HTTP_CODE)"
          fi
        done
        
        echo ""
        echo "💳 Payment System Health: $HEALTHY_ENDPOINTS/$TOTAL_ENDPOINTS endpoints accessible"
        
        if [[ $HEALTHY_ENDPOINTS -eq $TOTAL_ENDPOINTS ]]; then
          echo "🎉 All payment endpoints are accessible"
        elif [[ $HEALTHY_ENDPOINTS -ge $(( TOTAL_ENDPOINTS * 3 / 4 )) ]]; then
          echo "✅ Most payment endpoints are accessible"
        else
          echo "⚠️ Multiple payment endpoints are inaccessible"
        fi
    
    - name: Payment provider integration health
      run: |
        echo "💳 Checking payment provider integration health..."
        
        # Test Stripe integration health
        echo "🔵 Testing Stripe integration..."
        STRIPE_WEBHOOK_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
          -X POST "${{ env.BACKEND_URL }}/api/payments/stripe/webhook" \
          -H "Content-Type: application/json" \
          -d '{"type":"test"}' || echo "000")
        
        if [[ "$STRIPE_WEBHOOK_RESPONSE" == "400" || "$STRIPE_WEBHOOK_RESPONSE" == "401" ]]; then
          echo "✅ Stripe webhook endpoint is responding (HTTP $STRIPE_WEBHOOK_RESPONSE)"
        elif [[ "$STRIPE_WEBHOOK_RESPONSE" == "404" ]]; then
          echo "ℹ️ Stripe webhook endpoint not found (may not be implemented)"
        else
          echo "⚠️ Stripe webhook endpoint response: $STRIPE_WEBHOOK_RESPONSE"
        fi
        
        # Test Coinbase Commerce integration health
        echo "🟡 Testing Coinbase Commerce integration..."
        COINBASE_WEBHOOK_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
          -X POST "${{ env.BACKEND_URL }}/api/payments/coinbase/webhook" \
          -H "Content-Type: application/json" \
          -d '{"event":{"type":"test"}}' || echo "000")
        
        if [[ "$COINBASE_WEBHOOK_RESPONSE" == "400" || "$COINBASE_WEBHOOK_RESPONSE" == "401" ]]; then
          echo "✅ Coinbase webhook endpoint is responding (HTTP $COINBASE_WEBHOOK_RESPONSE)"
        elif [[ "$COINBASE_WEBHOOK_RESPONSE" == "404" ]]; then
          echo "ℹ️ Coinbase webhook endpoint not found (may not be implemented)"
        else
          echo "⚠️ Coinbase webhook endpoint response: $COINBASE_WEBHOOK_RESPONSE"
        fi
        
        # Test NOWPayments integration health
        echo "🟢 Testing NOWPayments integration..."
        NOWPAYMENTS_WEBHOOK_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
          -X POST "${{ env.BACKEND_URL }}/api/payments/nowpayments/webhook" \
          -H "Content-Type: application/json" \
          -d '{"payment_status":"test"}' || echo "000")
        
        if [[ "$NOWPAYMENTS_WEBHOOK_RESPONSE" == "400" || "$NOWPAYMENTS_WEBHOOK_RESPONSE" == "401" ]]; then
          echo "✅ NOWPayments webhook endpoint is responding (HTTP $NOWPAYMENTS_WEBHOOK_RESPONSE)"
        elif [[ "$NOWPAYMENTS_WEBHOOK_RESPONSE" == "404" ]]; then
          echo "ℹ️ NOWPayments webhook endpoint not found (may not be implemented)"
        else
          echo "⚠️ NOWPayments webhook endpoint response: $NOWPAYMENTS_WEBHOOK_RESPONSE"
        fi
    
    - name: Subscription system health
      run: |
        echo "📋 Checking subscription system health..."
        
        # Test subscription plans endpoint
        PLANS_RESPONSE=$(curl -s --max-time 15 "${{ env.BACKEND_URL }}/api/subscriptions/plans" || echo "ERROR")
        PLANS_HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ env.BACKEND_URL }}/api/subscriptions/plans" || echo "000")
        
        if [[ "$PLANS_HTTP_CODE" == "200" ]]; then
          echo "✅ Subscription plans endpoint is healthy"
          
          # Validate plans data structure
          if echo "$PLANS_RESPONSE" | jq . >/dev/null 2>&1; then
            PLAN_COUNT=$(echo "$PLANS_RESPONSE" | jq 'length' 2>/dev/null || echo "unknown")
            echo "   Available plans: $PLAN_COUNT"
            
            # Check if standard plans exist
            if echo "$PLANS_RESPONSE" | jq -e '.[] | select(.type == "FREE")' >/dev/null 2>&1; then
              echo "   ✅ FREE plan available"
            fi
            
            if echo "$PLANS_RESPONSE" | jq -e '.[] | select(.type == "STARTER")' >/dev/null 2>&1; then
              echo "   ✅ STARTER plan available"
            fi
            
            if echo "$PLANS_RESPONSE" | jq -e '.[] | select(.type == "PROFESSIONAL")' >/dev/null 2>&1; then
              echo "   ✅ PROFESSIONAL plan available"
            fi
            
            if echo "$PLANS_RESPONSE" | jq -e '.[] | select(.type == "ENTERPRISE")' >/dev/null 2>&1; then
              echo "   ✅ ENTERPRISE plan available"
            fi
          fi
        else
          echo "❌ Subscription plans endpoint is unhealthy (HTTP $PLANS_HTTP_CODE)"
        fi

  performance-monitoring:
    runs-on: ubuntu-latest
    name: 📈 Performance Monitoring
    needs: [system-health-overview, payment-system-health]
    
    steps:
    - name: API response time monitoring
      run: |
        echo "📈 Monitoring API response times..."
        
        # Test critical API endpoints for performance
        PERFORMANCE_ENDPOINTS=(
          "Health Check|${{ env.BACKEND_URL }}/health"
          "Plans List|${{ env.BACKEND_URL }}/api/subscriptions/plans"
          "Metrics|${{ env.BACKEND_URL }}/api/metrics"
        )
        
        SLOW_ENDPOINTS=()
        FAST_ENDPOINTS=()
        
        for endpoint_info in "${PERFORMANCE_ENDPOINTS[@]}"; do
          IFS='|' read -r endpoint_name endpoint_url <<< "$endpoint_info"
          
          echo "⏱️ Testing $endpoint_name response time..."
          
          # Measure response time
          RESPONSE_TIME=$(curl -s -o /dev/null -w "%{time_total}" --max-time 30 "$endpoint_url" || echo "timeout")
          
          if [[ "$RESPONSE_TIME" == "timeout" ]]; then
            echo "❌ $endpoint_name: Request timed out"
            SLOW_ENDPOINTS+=("$endpoint_name: timeout")
          else
            # Convert to milliseconds for easier reading
            RESPONSE_MS=$(echo "$RESPONSE_TIME * 1000" | bc -l | cut -d. -f1)
            echo "⏱️ $endpoint_name: ${RESPONSE_MS}ms"
            
            if (( $(echo "$RESPONSE_TIME > 5.0" | bc -l) )); then
              echo "⚠️ $endpoint_name is slow (>${RESPONSE_MS}ms)"
              SLOW_ENDPOINTS+=("$endpoint_name: ${RESPONSE_MS}ms")
            elif (( $(echo "$RESPONSE_TIME > 2.0" | bc -l) )); then
              echo "🟡 $endpoint_name has moderate response time (${RESPONSE_MS}ms)"
            else
              echo "✅ $endpoint_name has good response time (${RESPONSE_MS}ms)"
              FAST_ENDPOINTS+=("$endpoint_name: ${RESPONSE_MS}ms")
            fi
          fi
        done
        
        echo ""
        echo "📊 Performance Summary:"
        echo "   Fast endpoints: ${#FAST_ENDPOINTS[@]}"
        echo "   Slow endpoints: ${#SLOW_ENDPOINTS[@]}"
        
        if [[ ${#SLOW_ENDPOINTS[@]} -gt 0 ]]; then
          echo "   Slow endpoints details:"
          printf '     - %s\n' "${SLOW_ENDPOINTS[@]}"
        fi
    
    - name: Frontend loading performance
      run: |
        echo "🌐 Testing frontend loading performance..."
        
        FRONTEND_URLS=(
          "Main Website|${{ env.FRONTEND_URL }}"
          "Admin Dashboard|${{ env.ADMIN_URL }}"
        )
        
        for url_info in "${FRONTEND_URLS[@]}"; do
          IFS='|' read -r site_name site_url <<< "$url_info"
          
          echo "🔍 Testing $site_name loading time..."
          
          # Measure full page load time
          TOTAL_TIME=$(curl -s -o /dev/null -w "%{time_total}" --max-time 30 "$site_url" || echo "timeout")
          DNS_TIME=$(curl -s -o /dev/null -w "%{time_namelookup}" --max-time 30 "$site_url" || echo "timeout")
          CONNECT_TIME=$(curl -s -o /dev/null -w "%{time_connect}" --max-time 30 "$site_url" || echo "timeout")
          
          if [[ "$TOTAL_TIME" != "timeout" ]]; then
            TOTAL_MS=$(echo "$TOTAL_TIME * 1000" | bc -l | cut -d. -f1)
            DNS_MS=$(echo "$DNS_TIME * 1000" | bc -l | cut -d. -f1)
            CONNECT_MS=$(echo "$CONNECT_TIME * 1000" | bc -l | cut -d. -f1)
            
            echo "   Total time: ${TOTAL_MS}ms"
            echo "   DNS lookup: ${DNS_MS}ms"
            echo "   Connection: ${CONNECT_MS}ms"
            
            if (( $(echo "$TOTAL_TIME > 10.0" | bc -l) )); then
              echo "⚠️ $site_name is loading slowly (${TOTAL_MS}ms)"
            elif (( $(echo "$TOTAL_TIME > 5.0" | bc -l) )); then
              echo "🟡 $site_name has moderate load time (${TOTAL_MS}ms)"
            else
              echo "✅ $site_name has good load time (${TOTAL_MS}ms)"
            fi
          else
            echo "❌ $site_name loading timed out"
          fi
        done

  security-health-check:
    runs-on: ubuntu-latest
    name: 🔒 Security Health Check
    needs: system-health-overview
    
    steps:
    - name: HTTPS and SSL certificate health
      run: |
        echo "🔒 Checking HTTPS and SSL certificate health..."
        
        SECURE_URLS=(
          "${{ env.BACKEND_URL }}"
          "${{ env.FRONTEND_URL }}"
          "${{ env.ADMIN_URL }}"
        )
        
        for url in "${SECURE_URLS[@]}"; do
          echo "🔍 Checking SSL for $url..."
          
          # Extract domain from URL
          DOMAIN=$(echo "$url" | sed -e 's|^[^/]*//||' -e 's|/.*||')
          
          # Check SSL certificate expiration
          SSL_INFO=$(echo | timeout 10 openssl s_client -servername "$DOMAIN" -connect "$DOMAIN:443" 2>/dev/null | openssl x509 -noout -dates 2>/dev/null || echo "ERROR")
          
          if [[ "$SSL_INFO" != "ERROR" ]]; then
            echo "✅ SSL certificate is valid for $DOMAIN"
            
            # Extract expiration date
            EXPIRY_DATE=$(echo "$SSL_INFO" | grep "notAfter" | cut -d= -f2)
            if [[ -n "$EXPIRY_DATE" ]]; then
              echo "   Certificate expires: $EXPIRY_DATE"
              
              # Check if certificate expires within 30 days
              EXPIRY_TIMESTAMP=$(date -d "$EXPIRY_DATE" +%s 2>/dev/null || echo "0")
              CURRENT_TIMESTAMP=$(date +%s)
              DAYS_UNTIL_EXPIRY=$(( (EXPIRY_TIMESTAMP - CURRENT_TIMESTAMP) / 86400 ))
              
              if [[ $DAYS_UNTIL_EXPIRY -gt 0 ]]; then
                if [[ $DAYS_UNTIL_EXPIRY -lt 30 ]]; then
                  echo "⚠️ Certificate expires in $DAYS_UNTIL_EXPIRY days - renewal needed soon"
                else
                  echo "✅ Certificate is valid for $DAYS_UNTIL_EXPIRY more days"
                fi
              fi
            fi
          else
            echo "⚠️ Could not verify SSL certificate for $DOMAIN"
          fi
        done
    
    - name: Security headers check
      run: |
        echo "🛡️ Checking security headers..."
        
        SECURITY_HEADERS=(
          "Strict-Transport-Security"
          "Content-Security-Policy"
          "X-Content-Type-Options"
          "X-Frame-Options"
          "X-XSS-Protection"
        )
        
        for url in "${{ env.BACKEND_URL }}" "${{ env.FRONTEND_URL }}"; do
          echo "🔍 Checking security headers for $url..."
          
          # Get response headers
          HEADERS=$(curl -s -I --max-time 10 "$url" || echo "ERROR")
          
          if [[ "$HEADERS" != "ERROR" ]]; then
            PRESENT_HEADERS=0
            
            for header in "${SECURITY_HEADERS[@]}"; do
              if echo "$HEADERS" | grep -i "^$header:" >/dev/null; then
                echo "   ✅ $header: Present"
                ((PRESENT_HEADERS++))
              else
                echo "   ❌ $header: Missing"
              fi
            done
            
            echo "   Security headers score: $PRESENT_HEADERS/${#SECURITY_HEADERS[@]}"
          else
            echo "⚠️ Could not retrieve headers from $url"
          fi
        done

  generate-health-report:
    runs-on: ubuntu-latest
    name: 📊 Generate Health Report
    needs: [system-health-overview, payment-system-health, performance-monitoring, security-health-check]
    if: always()
    
    steps:
    - name: Create comprehensive health report
      run: |
        echo "📊 Generating comprehensive health report..."
        
        # Create detailed health report
        cat > nightly-health-report.md << 'EOF'
        # 🌙 N0DE Platform Nightly Health Report
        
        Generated on: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
        
        ## 🏥 System Health Overview
        - Overall Health: ${{ needs.system-health-overview.outputs.overall_health }}
        - Backend Status: ${{ needs.system-health-overview.outputs.backend_status }}
        - Frontend Status: ${{ needs.system-health-overview.outputs.frontend_status }}
        
        ## 💳 Payment System Status
        - Payment Endpoints: Monitored
        - Provider Integrations: Tested
        - Subscription System: Validated
        
        ## 📈 Performance Metrics
        - API Response Times: Monitored
        - Frontend Load Times: Measured
        - Database Connectivity: Verified
        
        ## 🔒 Security Status
        - SSL Certificates: Validated
        - Security Headers: Checked
        - HTTPS Enforcement: Verified
        
        ## 📋 Service URLs
        - Backend: ${{ env.BACKEND_URL }}
        - Frontend: ${{ env.FRONTEND_URL }}
        - Admin: ${{ env.ADMIN_URL }}
        
        ## 🚨 Alerts and Recommendations
        - Monitor services with degraded performance
        - Review SSL certificate expiration dates
        - Validate payment provider configurations
        - Check database connection pool health
        
        ## Next Actions
        - [ ] Address any failed health checks
        - [ ] Monitor performance trends
        - [ ] Update security configurations
        - [ ] Review payment system metrics
        EOF
        
        # Replace variables in the report
        sed -i "s/$(date -u '+%Y-%m-%d %H:%M:%S UTC')/$(date -u '+%Y-%m-%d %H:%M:%S UTC')/g" nightly-health-report.md
        
        echo "📄 Health report generated successfully"
        cat nightly-health-report.md
    
    - name: Upload health report
      uses: actions/upload-artifact@v4
      with:
        name: nightly-health-report-$(date +%Y%m%d)
        path: nightly-health-report.md
        retention-days: 7
    
    - name: Send health alert if needed
      if: needs.system-health-overview.outputs.overall_health == 'critical' || needs.system-health-overview.outputs.overall_health == 'degraded'
      run: |
        echo "🚨 System health is degraded - sending alert..."
        
        ALERT_MESSAGE="🚨 N0DE Platform Health Alert
        
        Overall Health: ${{ needs.system-health-overview.outputs.overall_health }}
        Backend Status: ${{ needs.system-health-overview.outputs.backend_status }}
        Frontend Status: ${{ needs.system-health-overview.outputs.frontend_status }}
        
        Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
        
        Please investigate immediately."
        
        echo "Alert message prepared:"
        echo "$ALERT_MESSAGE"
        
        # If webhook URL is configured, send alert
        if [[ -n "${{ env.ALERT_WEBHOOK }}" ]]; then
          curl -X POST "${{ env.ALERT_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"$ALERT_MESSAGE\"}" \
            --max-time 10 || echo "Failed to send alert webhook"
        else
          echo "No alert webhook configured - alert logged to GitHub Actions only"
        fi