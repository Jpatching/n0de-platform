name: Environment Variables Validation

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-environment:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Railway CLI
      run: |
        curl -fsSL https://railway.app/install.sh | sh
        echo "$HOME/.railway/bin" >> $GITHUB_PATH
    
    - name: Validate local environment template
      run: |
        echo "📋 Checking .env.template completeness..."
        if [ ! -f .env.template ]; then
          echo "❌ .env.template not found!"
          exit 1
        fi
        
        # Count variables in template
        TEMPLATE_VARS=$(grep -c "^[A-Z]" .env.template || true)
        echo "✅ Found $TEMPLATE_VARS variables in .env.template"
        
        # Check for placeholder values
        PLACEHOLDERS=$(grep -c "your-" .env.template || true)
        if [ $PLACEHOLDERS -gt 0 ]; then
          echo "⚠️ Found $PLACEHOLDERS placeholder values (expected for template)"
        fi
    
    - name: Validate Railway environment (if secrets available)
      if: ${{ secrets.RAILWAY_TOKEN }}
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      run: |
        echo "🚂 Validating Railway environment..."
        railway whoami
        
        # Run Railway validation script
        chmod +x scripts/validate-env.sh
        ./scripts/validate-env.sh railway
    
    - name: Check script permissions
      run: |
        echo "🔧 Checking script permissions..."
        ls -la scripts/
        
        # Verify all scripts are executable
        for script in scripts/*.sh; do
          if [ -x "$script" ]; then
            echo "✅ $script is executable"
          else
            echo "❌ $script is not executable"
            exit 1
          fi
        done
    
    - name: Validate environment sync scripts
      run: |
        echo "📜 Validating sync scripts..."
        
        # Check Railway sync script
        if grep -q "railway variables --set" scripts/sync-railway-env.sh; then
          echo "✅ Railway sync script contains variable setting commands"
        else
          echo "❌ Railway sync script missing variable commands"
          exit 1
        fi
        
        # Check Vercel sync script  
        if grep -q "vercel env add" scripts/sync-vercel-env.sh; then
          echo "✅ Vercel sync script contains env commands"
        else
          echo "❌ Vercel sync script missing env commands"
          exit 1
        fi
    
    - name: Test environment validation script
      run: |
        echo "🧪 Testing validation script with mock data..."
        
        # Create mock .env for testing
        cat > .env.test << EOF
        NODE_ENV=production
        PORT=3000
        JWT_SECRET=test-secret
        STRIPE_SECRET_KEY=sk_test_123
        EOF
        
        # Test validation logic (will fail but should not crash)
        ./scripts/validate-env.sh local || echo "Validation completed with expected failures"
    
    - name: Summary
      run: |
        echo "🎉 Environment validation workflow completed successfully!"
        echo ""
        echo "✅ Validated components:"
        echo "  - Environment template completeness"
        echo "  - Script permissions and structure"
        echo "  - Sync script command validation"
        echo "  - Validation script functionality"