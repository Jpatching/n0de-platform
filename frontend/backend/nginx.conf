worker_processes auto;
rtmp_auto_push on;

events {
    worker_connections 1024;
}

# RTMP configuration
rtmp {
    server {
        listen 1935;
        chunk_size 4000;
        
        # Live streaming application
        application live {
            live on;
            
            # Enable recording
            record all;
            record_path /var/recordings;
            record_unique on;
            record_suffix .flv;
            
            # Enable HLS
            hls on;
            hls_path /var/hls;
            hls_fragment 3;
            hls_playlist_length 60;
            hls_continuous on;
            hls_cleanup on;
            hls_nested on;
            
            # Authentication via HTTP callback
            on_publish http://backend:3000/api/streaming/auth/publish;
            on_publish_done http://backend:3000/api/streaming/auth/publish_done;
            
            # Stream events
            on_play http://backend:3000/api/streaming/auth/play;
            on_play_done http://backend:3000/api/streaming/auth/play_done;
            
            # Thumbnail generation
            exec_push ffmpeg -i rtmp://localhost/live/$name -vf fps=1/10 -f image2 /var/thumbnails/$name-%03d.jpg;
            
            # Multiple quality streams
            exec_push ffmpeg -i rtmp://localhost/live/$name 
                -c:v libx264 -c:a aac -b:v 1000k -b:a 128k -vf "scale=1280:720" -f flv rtmp://localhost/hls/$name_720p
                -c:v libx264 -c:a aac -b:v 500k -b:a 96k -vf "scale=854:480" -f flv rtmp://localhost/hls/$name_480p
                -c:v libx264 -c:a aac -b:v 250k -b:a 64k -vf "scale=640:360" -f flv rtmp://localhost/hls/$name_360p;
        }
        
        # HLS playback application
        application hls {
            live on;
            hls on;
            hls_path /var/hls;
            hls_fragment 3;
            hls_playlist_length 60;
            hls_continuous on;
            hls_cleanup on;
            hls_nested on;
        }
    }
}

# HTTP configuration for HLS playback
http {
    sendfile off;
    tcp_nopush on;
    directio 512;
    default_type application/octet-stream;
    
    server {
        listen 80;
        
        # CORS headers for web playback
        location / {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
            add_header 'Access-Control-Allow-Headers' 'Range' always;
            
            # Disable cache for live content
            add_header 'Cache-Control' 'no-cache' always;
            
            root /var;
        }
        
        # HLS streams
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /var;
            
            add_header 'Cache-Control' 'no-cache' always;
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        }
        
        # Thumbnails
        location /thumbnails {
            root /var;
            add_header 'Access-Control-Allow-Origin' '*' always;
        }
        
        # Stream statistics
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
            add_header 'Access-Control-Allow-Origin' '*' always;
        }
        
        location /stat.xsl {
            root /var/www/html;
        }
        
        # Health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
} 