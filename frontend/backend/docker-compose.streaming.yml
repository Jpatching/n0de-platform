version: '3.8'

services:
  # NGINX RTMP Server for live streaming
  nginx-rtmp:
    image: tiangolo/nginx-rtmp
    ports:
      - "1935:1935"  # RTMP port
      - "8080:80"    # HTTP port for HLS playback
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./recordings:/var/recordings
      - ./hls:/var/hls
    environment:
      - NGINX_RTMP_MODULE=on
    restart: unless-stopped
    networks:
      - streaming-network

  # Redis for session management and real-time data
  redis-streaming:
    image: redis:7-alpine
    ports:
      - "6380:6379"  # Different port to avoid conflicts
    volumes:
      - redis-streaming-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - streaming-network

  # FFmpeg service for stream processing
  ffmpeg-processor:
    build:
      context: .
      dockerfile: Dockerfile.ffmpeg
    volumes:
      - ./recordings:/recordings
      - ./hls:/hls
      - ./thumbnails:/thumbnails
    environment:
      - RTMP_URL=rtmp://nginx-rtmp:1935/live
      - HLS_OUTPUT_PATH=/hls
      - THUMBNAIL_PATH=/thumbnails
    depends_on:
      - nginx-rtmp
      - redis-streaming
    restart: unless-stopped
    networks:
      - streaming-network

volumes:
  redis-streaming-data:

networks:
  streaming-network:
    driver: bridge 