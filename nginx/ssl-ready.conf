# N0DE SSL-Ready Configuration
# Use this after DNS points to 212.108.83.175

server {
    listen 80;
    server_name n0de.pro www.n0de.pro;
    
    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }
    
    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name n0de.pro www.n0de.pro;
    
    # SSL Configuration (will be filled by certbot)
    ssl_certificate /etc/letsencrypt/live/n0de.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n0de.pro/privkey.pem;
    
    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    
    # API endpoints
    location ~ ^/api/v1/ {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
    }
    
    # Health check
    location = /health {
        proxy_pass http://localhost:3001/health;
        proxy_set_header Host $host;
    }
    
    # Root - info page
    location = / {
        return 200 'N0DE Backend API - Production Ready! 🚀
        
🔒 HTTPS: Enabled
🚀 API: /api/v1/*
🏥 Health: /health
        ';
        add_header Content-Type text/plain;
    }
}