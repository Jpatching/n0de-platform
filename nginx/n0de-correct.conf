# N0DE Platform Configuration 
# Frontend on Vercel + Backend API on bare metal

# Fix for 494 Request Header Too Large  
client_header_buffer_size 8k;
large_client_header_buffers 4 32k;
client_max_body_size 50M;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# Main domain - API routes to backend, everything else redirects to Vercel
server {
    server_name n0de.pro www.n0de.pro;
    
    # API routes - proxy to local backend on port 4000
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        
        # CORS headers for API
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }
        
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        proxy_pass http://localhost:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        
        # API specific timeouts
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        
        # Buffer settings for API
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # All other routes - redirect to Vercel-deployed frontend
    location / {
        # Get the Vercel deployment URL - you'll need to set this
        return 302 https://n0de-website-git-main-jpatching.vercel.app$request_uri;
    }
    
    # Health check for API
    location = /api/health {
        proxy_pass http://localhost:4000/health;
        proxy_set_header Host $host;
    }
    
    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/n0de.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n0de.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP redirect for main domain
server {
    listen 80;
    server_name n0de.pro www.n0de.pro;
    return 301 https://$server_name$request_uri;
}

# API subdomain - redirect to main domain API (backward compatibility)
server {
    server_name api.n0de.pro;
    
    location / {
        return 301 https://n0de.pro/api$request_uri;
    }

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/n0de.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n0de.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP redirect for API subdomain
server {
    listen 80;
    server_name api.n0de.pro;
    return 301 https://api.n0de.pro$request_uri;
}