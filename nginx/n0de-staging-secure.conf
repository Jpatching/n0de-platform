# N0DE Staging Configuration - IP Restricted for Development Security
# Only accessible from your PC and server IPs

# Define allowed IPs
geo $allowed_ip {
    default 0;
    127.0.0.1 1;                    # Server localhost
    212.108.83.175 1;               # Server public IP
    172.17.0.1 1;                   # Docker network
    172.18.0.1 1;                   # Docker network
    86.22.235.7 1;                  # Your PC's public IP (detected from SSH)
}

# Staging backend API (restricted access)
server {
    listen 8001;                    # Different port for staging
    server_name staging.n0de.pro 212.108.83.175;
    
    # Block all non-allowed IPs
    if ($allowed_ip = 0) {
        return 403 "Access denied - Development environment restricted";
    }
    
    # Backend API endpoints with extra security
    location ~ ^/api/v1/ {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Development security headers
        add_header X-Dev-Environment "STAGING-RESTRICTED";
        add_header X-Access-Control "IP-RESTRICTED";
        
        # CORS for staging
        add_header Access-Control-Allow-Origin "http://localhost:3000";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        add_header Access-Control-Allow-Credentials true;
        
        if ($request_method = 'OPTIONS') {
            return 200;
        }
    }
    
    # RPC endpoints (HIGHLY RESTRICTED)
    location ~ ^/rpc/ {
        # Log all RPC access attempts
        access_log /var/log/nginx/rpc-access.log combined;
        
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # RPC security headers
        add_header X-RPC-Access "DEVELOPMENT-ONLY";
        add_header X-IP-Restricted "true";
    }
    
    # Health check (allowed)
    location = /health {
        proxy_pass http://localhost:3001/health;
        proxy_set_header Host $host;
        add_header X-Health-Check "STAGING";
    }
    
    # Development status page
    location = / {
        return 200 'N0DE Staging Environment - IP RESTRICTED

DEVELOPMENT SECURITY ACTIVE
Server IP: 212.108.83.175
Public Access: BLOCKED
Your IP: $remote_addr

Staging API: http://212.108.83.175:8001/api/v1/*
Health Check: /health
Status: Development Mode

This is a restricted development environment.
Only authorized IPs can access this service.
';
        add_header Content-Type text/plain;
        add_header X-Environment "STAGING-RESTRICTED";
    }
}