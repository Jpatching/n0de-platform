# N0DE Platform API Configuration 
# API-only configuration for api.n0de.pro
# Frontend served directly by Vercel

# Fix for 494 Request Header Too Large  
client_header_buffer_size 8k;
large_client_header_buffers 4 32k;
client_max_body_size 50M;

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

# API subdomain - handles all backend endpoints
server {
    server_name api.n0de.pro;
    
    location / {
        limit_req zone=api burst=20 nodelay;
        
        # CORS headers for API
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }
        
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        proxy_pass http://localhost:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Server $host;
        
        # API specific timeouts
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        
        # Buffer settings for API
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # WebSocket support for real-time features
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
    
    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/n0de.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n0de.pro/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP redirect for API subdomain
server {
    listen 80;
    server_name api.n0de.pro;
    return 301 https://api.n0de.pro$request_uri;
}

# NOTE: n0de.pro and www.n0de.pro should be handled by Vercel
# To complete the setup:
# 1. Update DNS: n0de.pro and www.n0de.pro -> Vercel IPs (76.223.126.88)
# 2. Keep DNS: api.n0de.pro -> 212.108.83.175 (this server)
# 3. Replace /etc/nginx/sites-enabled/n0de with this config