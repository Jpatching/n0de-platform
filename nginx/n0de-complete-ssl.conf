# N0DE Complete SSL Configuration - RPC + Website Backend with HTTPS
# Handles both Solana RPC and Website API traffic with SSL/TLS encryption

# Rate limiting zones
limit_req_zone $api_key zone=rpc_users:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=by_ip:10m rate=50r/s;
limit_req_zone $binary_remote_addr zone=api_users:10m rate=200r/s;

# Upstream definitions
upstream solana_rpc {
    server 127.0.0.1:8899;
    keepalive 32;
}

upstream n0de_backend {
    server 127.0.0.1:3001;
    keepalive 16;
}

# Logging format
log_format n0de_access '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_api_key" '
                       'rt=$request_time uct="$upstream_connect_time" '
                       'uht="$upstream_header_time" urt="$upstream_response_time"';

# HTTP to HTTPS redirect
server {
    listen 80;
    server_name n0de.pro www.n0de.pro;
    
    # Allow Let's Encrypt challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }
    
    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name n0de.pro www.n0de.pro;
    
    # SSL Configuration for n0de.pro (212.108.83.175)
    ssl_certificate /etc/letsencrypt/live/n0de.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n0de.pro/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/n0de.pro/chain.pem;
    
    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    
    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000" always;
    
    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;
    
    # Logging
    access_log /var/log/nginx/n0de_ssl_access.log n0de_access;
    error_log /var/log/nginx/n0de_ssl_error.log warn;
    
    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https:; font-src 'self' https:; object-src 'none'; media-src 'self'; frame-src 'none';" always;
    
    # Website API endpoints
    location ~ ^/api/v1/ {
        # Handle preflight requests
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' 'https://n0de.pro' always;
            add_header 'Access-Control-Allow-Origin' 'https://www.n0de.pro' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000 always;
            add_header 'Content-Type' 'text/plain; charset=utf-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }
        
        # CORS headers for actual requests
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        
        # Rate limiting for API
        limit_req zone=api_users burst=400 nodelay;
        limit_req_status 429;
        
        # Proxy to N0DE Backend
        proxy_pass http://n0de_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # SSL proxy headers
        proxy_set_header X-Forwarded-Ssl on;
        proxy_set_header X-Forwarded-Protocol https;
        
        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Response buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
    
    # Solana RPC with API key authentication
    location ~ ^/rpc/([a-zA-Z0-9_]+)$ {
        set $api_key $1;
        
        # Validate API key via backend
        auth_request /auth/rpc;
        auth_request_set $user_plan $upstream_http_x_user_plan;
        auth_request_set $rate_limit $upstream_http_x_rate_limit;
        
        # Apply RPC rate limiting
        limit_req zone=rpc_users burst=200 nodelay;
        limit_req_status 429;
        
        # CORS for RPC (more restrictive)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'POST, GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, X-API-Key' always;
        
        # Proxy to Solana RPC
        proxy_pass http://solana_rpc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-API-Key $api_key;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # RPC-specific timeouts
        proxy_connect_timeout 2s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Response headers
        add_header X-RPC-Plan $user_plan always;
        add_header X-Rate-Limit $rate_limit always;
    }
    
    # Internal auth validation for RPC
    location = /auth/rpc {
        internal;
        proxy_pass http://n0de_backend/api/v1/auth/rpc;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-API-Key $api_key;
        proxy_set_header X-Original-URI $request_uri;
    }
    
    # Direct RPC endpoint (backward compatibility)
    location = /rpc {
        return 401 '{"error":"API key required. Use /rpc/YOUR_API_KEY"}';
        add_header Content-Type application/json always;
    }
    
    # Health checks
    location = /health {
        access_log off;
        proxy_pass http://solana_rpc;
        proxy_set_header Host $host;
    }
    
    location = /api/health {
        access_log off;
        proxy_pass http://n0de_backend/health;
        proxy_set_header Host $host;
    }
    
    # Website API documentation
    location = /docs {
        proxy_pass http://n0de_backend/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Root - info page
    location = / {
        return 200 'n0de RPC & API Server (Secure)
        
🚀 Solana RPC: Use /rpc/YOUR_API_KEY
📡 Website API: /api/v1/*  
📚 API Docs: /docs
🏥 Health: /health (RPC) | /api/health (API)
🔒 SSL: Enabled with modern TLS

Contact support for API access.
';
        add_header Content-Type text/plain always;
    }
    
    # Block everything else
    location / {
        return 404 '{"error":"Endpoint not found"}';
        add_header Content-Type application/json always;
    }
    
    # Error pages
    error_page 429 @rate_limit;
    location @rate_limit {
        return 429 '{"error":"Rate limit exceeded. Please upgrade your plan or try again later.","retry_after":60}';
        add_header Content-Type application/json always;
        add_header Retry-After 60 always;
    }
    
    error_page 502 503 504 @backend_error;
    location @backend_error {
        return 503 '{"error":"Service temporarily unavailable. Please try again later."}';
        add_header Content-Type application/json always;
    }
}