# N0DE Complete Staging Environment - Full IP Restriction
# Self-hosted frontend + backend for development security

# Define allowed IPs for development
geo $dev_allowed_ip {
    default 0;
    127.0.0.1 1;                    # Server localhost
    212.108.83.175 1;               # Server public IP  
    86.22.235.7 1;                  # Your PC's public IP
    172.17.0.1 1;                   # Docker networks
    172.18.0.1 1;
}

# Rate limiting zones for development
limit_req_zone $binary_remote_addr zone=dev_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=dev_rpc:10m rate=2r/s;
limit_req_zone $binary_remote_addr zone=dev_auth:10m rate=5r/s;

# STAGING FRONTEND (IP RESTRICTED) - Port 8000
server {
    listen 8000;
    server_name staging.n0de.pro 212.108.83.175;
    
    # Block unauthorized IPs
    if ($dev_allowed_ip = 0) {
        return 403 "🚫 STAGING ACCESS DENIED - Development environment restricted to authorized IPs only";
    }
    
    # Serve static files with caching
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        proxy_cache_valid 60m;
        add_header X-Environment "STAGING-FRONTEND";
    }
    
    # Proxy all requests to local Next.js dev server  
    location / {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Next.js WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        
        # Development headers
        add_header X-Environment "STAGING-FRONTEND";
        add_header X-Access-Control "IP-RESTRICTED";
        add_header X-Dev-Mode "true";
        
        # Security headers for staging
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }
}

# STAGING BACKEND API (IP RESTRICTED) - Port 8001
server {
    listen 8001;
    server_name api-staging.n0de.pro 212.108.83.175;
    
    # Block unauthorized IPs
    if ($dev_allowed_ip = 0) {
        return 403 "🚫 API ACCESS DENIED - Development environment restricted";
    }
    
    # Authentication endpoints (extra protection)
    location ~ ^/api/v1/auth/ {
        limit_req zone=dev_auth burst=3 nodelay;
        
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Auth-specific headers
        add_header X-Auth-Environment "STAGING";
        add_header X-IP-Restricted "true";
        
        # Log all auth attempts
        access_log /var/log/nginx/staging-auth.log combined;
    }
    
    # General API endpoints
    location ~ ^/api/v1/ {
        limit_req zone=dev_api burst=20 nodelay;
        
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS for staging frontend
        add_header Access-Control-Allow-Origin "http://212.108.83.175:8000";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With";
        add_header Access-Control-Allow-Credentials true;
        
        # Development headers
        add_header X-Environment "STAGING-API";
        add_header X-Access-Control "IP-RESTRICTED";
        
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "http://212.108.83.175:8000";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With";
            add_header Access-Control-Allow-Credentials true;
            return 200;
        }
    }
    
    # RPC endpoints (MAXIMUM SECURITY)
    location ~ ^/rpc/ {
        # Ultra-restrictive rate limiting
        limit_req zone=dev_rpc burst=2 nodelay;
        
        # Additional IP check for RPC (can be even more restrictive)
        allow 127.0.0.1;
        allow 212.108.83.175;
        allow 86.22.235.7;
        deny all;
        
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # RPC security headers
        add_header X-RPC-Environment "STAGING-RESTRICTED";
        add_header X-Sensitive-Data "true";
        add_header X-IP-Verified "true";
        
        # Log ALL RPC requests
        access_log /var/log/nginx/rpc-staging.log combined;
        error_log /var/log/nginx/rpc-staging-error.log;
    }
    
    # Health check
    location = /health {
        proxy_pass http://localhost:3001/health;
        add_header X-Health-Environment "STAGING";
    }
    
    # Development status page
    location = / {
        return 200 '🔒 N0DE STAGING API - SECURED

🛡️  DEVELOPMENT SECURITY ACTIVE
📍 Your IP: $remote_addr
🔐 Access Status: AUTHORIZED

🚀 STAGING ENDPOINTS:
   Frontend: http://212.108.83.175:8000
   API: http://212.108.83.175:8001/api/v1/*
   RPC: http://212.108.83.175:8001/rpc/* (RESTRICTED)
   Health: /health

⚠️  SECURITY FEATURES:
   ✅ IP Whitelist Active
   ✅ Rate Limiting Enforced  
   ✅ RPC Access Restricted
   ✅ Authentication Monitoring
   ✅ Request Logging Enabled

🎯 Environment: STAGING
🔒 Access Level: DEVELOPMENT ONLY
';
        add_header Content-Type text/plain;
        add_header X-Environment "STAGING-STATUS";
    }
}

# PRODUCTION FRONTEND (PUBLIC - keep Vercel)
# This configuration ensures production stays on Vercel while staging is self-hosted

# Optional: Production API proxy (if you want to self-host production API too)
server {
    listen 80;
    server_name api.n0de.pro;
    
    # Public production API (no IP restrictions)
    location ~ ^/api/v1/ {
        # Production rate limiting (more lenient)
        limit_req_zone $binary_remote_addr zone=prod_api:10m rate=30r/s;
        limit_req zone=prod_api burst=50 nodelay;
        
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Production headers
        add_header X-Environment "PRODUCTION";
        add_header X-Access-Level "PUBLIC";
        
        # Production CORS (for Vercel frontend)
        add_header Access-Control-Allow-Origin "https://www.n0de.pro";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
        add_header Access-Control-Allow-Credentials true;
        
        if ($request_method = 'OPTIONS') {
            return 200;
        }
    }
    
    # RPC for production (can be more open or restricted based on needs)
    location ~ ^/rpc/ {
        # Log production RPC usage
        access_log /var/log/nginx/rpc-production.log combined;
        
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        add_header X-RPC-Environment "PRODUCTION";
    }
}