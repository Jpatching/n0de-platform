# fail2ban configuration for N0DE platform

[DEFAULT]
bantime = 3600
findtime = 600
maxretry = 3
ignoreip = 127.0.0.1/8 212.108.83.175 86.22.235.7

[sshd]
enabled = true
port = 22
logpath = /var/log/auth.log
maxretry = 3

[nginx-http-auth]
enabled = true
filter = nginx-http-auth
port = http,https
logpath = /var/log/nginx/error.log
maxretry = 3

[nginx-noscript]
enabled = true
port = http,https
filter = nginx-noscript
logpath = /var/log/nginx/access.log
maxretry = 6

[nginx-staging]
enabled = true
filter = nginx-staging
port = 8000,8001
logpath = /var/log/nginx/staging-auth.log
maxretry = 2

[n0de-rpc-protection]
enabled = true
filter = n0de-rpc
port = 8001
logpath = /var/log/nginx/rpc-staging.log
maxretry = 1